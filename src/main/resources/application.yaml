spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai-springboot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  main:
    allow-bean-definition-overriding: true
#服务器配置
server:
  port: 8090
#日志配置
logging:
  level:
    root: INFO
#JWT配置
jwt:
  secret: xiaoxiao
  # 过期时间
  expiration: 86400000
  # 刷新令牌过期时间
  refreshTokenExpiration: 604800000
  # 头信息
  header: token
  # 令牌前缀
  tokenPrefix: Bearer
  # 签发者
  issuer: xxs
